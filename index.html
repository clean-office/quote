<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>모두랩 견적 대시보드</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<style>
:root{
  --pageBg:#f8f5ee; --card:#fffdf8; --cardBorder:#e6dfcd; --cardHead:#fbf8f0; --divider:#efe9d9;
  --text:#2b2417; --muted:#a2977e; --accent:#8B6914; --accentSoft:#f3ecd8;
  --field:#fbf8f0; --fieldBorder:#e6dfcd; --inputBg:#fffdf8; --inputBorder:#ddd4bf;
  --barBg:#2b2417; --barText:#f3e9cf; --barMuted:#b8a97f;
  --dash:#cbbf9d; --dashText:#8B6914; --addBg:#faf6ea; --addBorder:#cbbf9d;
  --segOn:#8B6914; --segOff:#e6dfcd; --stepOn:#2b2417; --stepOff:#a2977e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Pretendard,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;background:var(--pageBg);color:var(--text);}
input,textarea,select{font-family:inherit;}
.app{max-width:440px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--pageBg);position:relative;}
.apphead{position:sticky;top:0;z-index:40;background:var(--card);border-bottom:1px solid var(--cardBorder);padding:12px 16px;}
.apphead .top{display:flex;justify-content:space-between;align-items:center;gap:8px;}
.wm{font-size:16px;font-weight:800;color:var(--text);white-space:nowrap;}
.wm span{color:var(--accent);}
.hint{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:5px;}
.menu{display:flex;gap:6px;flex-shrink:0;}
.menu button{border:1px solid var(--inputBorder);background:var(--card);color:var(--muted);font-size:11.5px;font-weight:600;border-radius:4px;padding:5px 9px;cursor:pointer;}
.segs{display:flex;gap:6px;margin-top:12px;}
.segs .seg{flex:1;height:4px;border-radius:2px;background:var(--segOff);cursor:pointer;transition:.2s;}
.segs .seg.on{background:var(--segOn);}
.steplabels{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;}
.steplabels span{cursor:pointer;color:var(--stepOff);font-weight:400;}
.steplabels span.on{color:var(--stepOn);font-weight:700;}
.appbody{flex:1;overflow-y:auto;padding:14px;padding-bottom:96px;}
.step{display:none;flex-direction:column;gap:12px;}
.step.on{display:flex;}
.card{background:var(--card);border:1px solid var(--cardBorder);border-radius:6px;padding:16px;}
.fld{margin-bottom:12px;}
.fld:last-child{margin-bottom:0;}
.fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
.in{width:100%;border:1px solid var(--inputBorder);background:var(--inputBg);color:var(--text);border-radius:4px;padding:11px 12px;font-size:15px;}
textarea.in{resize:vertical;font-size:14px;line-height:1.5;}
.in:focus{outline:2px solid var(--accentSoft);}
.sec{background:var(--card);border:1px solid var(--cardBorder);border-radius:6px;overflow:hidden;margin-bottom:12px;}
.sec-head{display:flex;gap:8px;align-items:center;padding:10px 12px;background:var(--cardHead);border-bottom:1px solid var(--divider);}
.sec-no{width:24px;height:24px;border-radius:8px;background:var(--accentSoft);color:var(--accent);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sec-name{flex:1;min-width:0;border:none;background:transparent;font-size:15px;font-weight:700;color:var(--text);padding:4px;}
.sec-sub{font-size:13px;font-weight:700;color:var(--accent);white-space:nowrap;}
.iconx{cursor:pointer;font-size:16px;color:var(--muted);flex-shrink:0;background:none;border:none;line-height:1;padding:0 2px;}
.sec-body{padding:10px 12px;display:flex;flex-direction:column;gap:10px;}
.item{border:1px solid var(--divider);background:var(--inputBg);border-radius:4px;padding:10px;display:flex;flex-direction:column;gap:8px;}
.item .r1{display:flex;gap:8px;align-items:center;}
.item .r1 input{min-width:0;border:1px solid var(--fieldBorder);background:var(--inputBg);border-radius:8px;padding:8px 9px;font-size:14px;color:var(--text);}
.item .nm{flex:1.2;font-weight:600;}
.item .sp{flex:1;font-size:13px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cell{background:var(--field);border-radius:8px;padding:7px 9px;}
.cell label{display:block;font-size:10.5px;color:var(--muted);margin-bottom:1px;}
.cell input{width:100%;border:none;background:transparent;font-size:14px;font-weight:600;color:var(--text);padding:2px 0;}
.item .amt{text-align:right;font-size:13.5px;color:var(--text);}
.item .amt span{font-size:11.5px;color:var(--muted);margin-right:6px;}
.additem{cursor:pointer;text-align:center;padding:9px;font-size:13px;font-weight:600;border:1.5px dashed var(--dash);color:var(--dashText);border-radius:4px;background:none;width:100%;}
.addsec{cursor:pointer;text-align:center;padding:13px;font-size:14px;font-weight:700;border:1.5px dashed var(--addBorder);color:var(--accent);background:var(--addBg);border-radius:6px;width:100%;}
.tri{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.tri .cell input{font-size:15px;font-weight:700;}
.sumcard{display:flex;flex-direction:column;gap:9px;font-size:14px;}
.sumcard .r{display:flex;justify-content:space-between;}
.sumcard .r.m{color:var(--muted);}
.sumcard .tot{display:flex;justify-content:space-between;padding-top:9px;border-top:1px solid var(--divider);font-size:16px;}
.sumcard .tot b:last-child{color:var(--accent);}
.exprow{display:flex;gap:10px;}
.expbtn{flex:1;text-align:center;padding:13px;font-size:14px;font-weight:700;background:var(--card);border:1px solid var(--inputBorder);border-radius:4px;color:var(--text);cursor:pointer;}
.expbtn.pri{background:var(--accent);color:#fff;border-color:var(--accent);}
.note{font-size:12px;color:var(--muted);text-align:center;line-height:1.6;}
details.import summary{cursor:pointer;font-size:13px;color:var(--dashText);font-weight:600;list-style:none;}
details.import summary::-webkit-details-marker{display:none;}
.appbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:440px;background:var(--barBg);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;justify-content:space-between;align-items:center;gap:12px;z-index:50;}
.appbar .lab{font-size:11px;color:var(--barMuted);white-space:nowrap;}
.appbar .amt{font-size:19px;font-weight:800;color:var(--barText);white-space:nowrap;}
.appbar .nav{display:flex;gap:8px;flex-shrink:0;}
.appbar .nav button{border:none;border-radius:4px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;}
.appbar .prev{background:rgba(255,255,255,.12);color:var(--barText);}
.appbar .next{background:var(--accent);color:#fff;}
.sheetlabel{font-size:12.5px;font-weight:700;color:var(--muted);}
.sheetwrap{overflow:hidden;border-radius:6px;box-shadow:0 3px 14px rgba(0,0,0,.14);background:#fff;}
.sheet{width:720px;min-height:509px;transform-origin:top left;background:#fff;box-sizing:border-box;color:#1c1c1c;font-family:Pretendard,sans-serif;display:flex;flex-direction:column;}
.sheet .pad{flex:1;display:flex;flex-direction:column;}
dialog{border:none;border-radius:8px;padding:18px;width:min(94vw,420px);}
dialog::backdrop{background:rgba(0,0,0,.45);}
dialog h3{font-size:16px;margin-bottom:10px;}
.savelist{list-style:none;}
.savelist li{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:1px solid var(--divider);gap:8px;}
.savelist .nm{flex:1;font-size:14px;}
.savelist button{border:none;border-radius:4px;padding:5px 10px;font-size:12px;cursor:pointer;}
.savelist .open{background:var(--accent);color:#fff;}
.savelist .del{background:#fbe9e7;color:#a33;}
.dclose{margin-top:12px;width:100%;border:1px solid var(--inputBorder);background:var(--card);border-radius:4px;padding:10px;font-size:14px;cursor:pointer;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#2b2417;color:#f3e9cf;padding:10px 20px;border-radius:20px;font-size:13.5px;z-index:99;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.25);}
.toast.on{opacity:1;}
.busy{position:fixed;inset:0;background:rgba(255,255,255,.7);display:none;align-items:center;justify-content:center;z-index:200;font-size:15px;font-weight:700;color:var(--text);}
</style>
</head>
<body>
<div class="app">
  <header class="apphead">
    <div class="top">
      <div class="wm">moredo<span>lab</span> 견적</div>
      <div class="menu">
        <button onclick="openSaves()">저장목록</button>
        <button onclick="newQuote()">새 견적</button>
      </div>
    </div>
    <div class="hint" id="hintTitle">새 견적</div>
    <div class="segs">
      <div class="seg" data-s="1" onclick="goStep(1)"></div>
      <div class="seg" data-s="2" onclick="goStep(2)"></div>
      <div class="seg" data-s="3" onclick="goStep(3)"></div>
      <div class="seg" data-s="4" onclick="goStep(4)"></div>
    </div>
    <div class="steplabels">
      <span data-s="1" onclick="goStep(1)">기본정보</span>
      <span data-s="2" onclick="goStep(2)">공종·품목</span>
      <span data-s="3" onclick="goStep(3)">간접비</span>
      <span data-s="4" onclick="goStep(4)">미리보기</span>
    </div>
  </header>

  <div class="appbody">
    <div class="step" data-s="1">
      <div class="card">
        <div class="fld"><label>공사명 (PROJECT)</label><input class="in" id="fTitle" placeholder="예: 봉천 치킨배달전문매장" oninput="touch()"></div>
        <div class="fld"><label>제출처 (TO)</label><input class="in" id="fClient" placeholder="예: 모두랩 김성원실장" oninput="touch()"></div>
        <div class="fld"><label>날짜</label><input class="in" id="fDate" type="date" oninput="touch()"></div>
        <div class="fld"><label>견적조건 (TERMS)</label><textarea class="in" id="fTerms" rows="3" oninput="touch()"></textarea></div>
      </div>
      <div class="card">
        <details class="import">
          <summary>＋ 텍스트로 한번에 입력 (카톡 메모 붙여넣기)</summary>
          <textarea class="in" id="fPaste" rows="7" style="margin-top:10px" placeholder="공사명: 봉천 치킨배달전문점&#10;제출처: 모두랩 김성원실장&#10;&#10;[철거]&#10;데크철거 / 식 1 / 재료 100,000 / 노무 130,000&#10;&#10;[목공]&#10;데크 / 합성데크140 / 장 15 / 재료 18,500&#10;목수 / 인 1 / 노무 420,000"></textarea>
          <button class="additem" style="margin-top:8px" onclick="importText()">불러오기 (기존 내용 대체)</button>
        </details>
      </div>
    </div>

    <div class="step" data-s="2">
      <div id="sections"></div>
      <button class="addsec" onclick="addSection()">＋ 공종 추가</button>
    </div>

    <div class="step" data-s="3">
      <div class="card">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px">간접비 요율</div>
        <div class="tri">
          <div class="cell"><label>공사경비 %</label><input id="r1" inputmode="decimal" oninput="touch()"></div>
          <div class="cell"><label>공과잡비 %</label><input id="r2" inputmode="decimal" oninput="touch()"></div>
          <div class="cell"><label>기업이윤 %</label><input id="r3" inputmode="decimal" oninput="touch()"></div>
        </div>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:700;margin-bottom:8px">단수정리</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:6px">목표 총액 (비우면 만원 미만 절사)</div>
        <input class="in" id="fTarget" inputmode="numeric" placeholder="예: 7300000" oninput="touch()">
      </div>
      <div class="card sumcard" id="calcSummary"></div>
    </div>

    <div class="step" data-s="4">
      <div class="exprow">
        <button class="expbtn pri" onclick="exportJPG()">JPG 저장 (3장)</button>
        <button class="expbtn pri" onclick="exportXLSX()">엑셀 저장</button>
      </div>
      <button class="expbtn" onclick="saveAs()">저장목록에 저장</button>
      <div class="note">아래 3장이 저장됩니다 — 폰은 저장 시 뜨는 공유창에서 ‘이미지 저장’ → 사진 앱에 들어가요</div>
      <div class="sheetlabel">1. 갑지</div>
      <div class="sheetwrap"><div class="sheet" id="sheetGap"></div></div>
      <div class="sheetlabel">2. 집계표</div>
      <div class="sheetwrap"><div class="sheet" id="sheetSum"></div></div>
      <div class="sheetlabel">3. 공사 내역서</div>
      <div class="sheetwrap"><div class="sheet" id="sheetDet"></div></div>
      <div class="note">로고·명함·엑셀 수식은 기존 그대로 유지됩니다.</div>
    </div>
  </div>

  <div class="appbar">
    <div><div class="lab" id="barLabel">기본정보 입력</div><div class="amt" id="barAmount">₩0</div></div>
    <div class="nav">
      <button class="prev" id="btnPrev" onclick="prevStep()" style="display:none">이전</button>
      <button class="next" id="btnNext" onclick="nextStep()">품목 입력 →</button>
    </div>
  </div>
</div>

<dialog id="dlgSaves">
  <h3>저장된 견적</h3>
  <input id="saveSearch" class="in" placeholder="🔍 현장명 검색" oninput="renderSaveList()" style="margin-bottom:12px">
  <ul class="savelist" id="saveList"></ul>
  <button class="dclose" onclick="dlgSaves.close()">닫기</button>
</dialog>

<div class="toast" id="toast"></div>
<div class="busy" id="busy">파일 만드는 중…</div>

let state=null;
let curStep=1;
const $=id=>document.getElementById(id);
const fmt=n=>(n||0).toLocaleString("ko-KR");
const num=v=>{const n=parseFloat(String(v).replace(/[^\d.\-]/g,""));return isNaN(n)?0:n;};

function blankItem(){return {name:"",spec:"",unit:"",qty:"",mat:"",lab:""};}
function blankSection(){return {name:"",items:[blankItem(),blankItem(),blankItem()]};}
function defaultState(){return {title:"",client:"",date:new Date().toISOString().slice(0,10),
 terms:"- V.A.T 별도\n- 견적사항 외 별도",r1:2.5,r2:2.5,r3:5,target:"",sections:[blankSection()]};}

function itemAmt(it){const q=num(it.qty);return {m:q*num(it.mat),l:q*num(it.lab)};}
function secSum(s){let m=0,l=0;s.items.forEach(it=>{const a=itemAmt(it);m+=a.m;l+=a.l;});return {m,l,t:m+l};}
function calc(){
  const direct=state.sections.reduce((a,s)=>a+secSum(s).t,0);
  const g1=Math.round(direct*state.r1/100),g2=Math.round(direct*state.r2/100),g3=Math.round(direct*state.r3/100);
  const indirect=g1+g2+g3;
  const raw=direct+indirect;
  let cut;
  const tgt=num(state.target);
  if(state.target!=="" && tgt>0) cut=raw-tgt; else cut=raw%10000;
  const total=raw-cut;
  return {direct,g1,g2,g3,indirect,raw,cut,total};
}

function hangulNum(n){
  if(n===0)return "영";
  const d=["","일","이","삼","사","오","육","칠","팔","구"];
  const sm=["","십","백","천"];
  const big=["","만","억","조"];
  let s="",gi=0;
  while(n>0){
    let part=n%10000,ps="";
    for(let i=0;i<4;i++){
      const dg=part%10;
      if(dg) ps=(dg===1&&i>0?"":d[dg])+sm[i]+ps;
      part=Math.floor(part/10);
    }
    if(ps) s=ps+big[gi]+s;
    n=Math.floor(n/10000);gi++;
  }
  return s;
}
function esc(v){return String(v??"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");}
function dateKor(d){const p=(d||"").split("-");return p.length===3?`${p[0]}. ${p[1]}. ${p[2]}.`:d;}
function termsHtml(){return esc(state.terms);}

    const d=document.createElement("div");d.className="sec";
    const sum=secSum(s);
    let items="";
    s.items.forEach((it,ii)=>{
      const a=itemAmt(it);const tot=a.m+a.l;
      items+=`<div class="item">
        <div class="r1">
          <input class="nm" value="${esc(it.name)}" placeholder="품명" oninput="uIt(${si},${ii},'name',this.value)">
          <input class="sp" value="${esc(it.spec)}" placeholder="규격" oninput="uIt(${si},${ii},'spec',this.value)">
          <button class="iconx" onclick="delIt(${si},${ii})">×</button>
        </div>
        <div class="grid2">
          <div class="cell"><label>단위</label><input value="${esc(it.unit)}" placeholder="식" oninput="uIt(${si},${ii},'unit',this.value)"></div>
          <div class="cell"><label>수량</label><input value="${esc(it.qty)}" placeholder="1" inputmode="decimal" oninput="uIt(${si},${ii},'qty',this.value)"></div>
          <div class="cell"><label>재료단가</label><input value="${esc(it.mat)}" placeholder="0" inputmode="numeric" oninput="uIt(${si},${ii},'mat',this.value)"></div>
          <div class="cell"><label>노무단가</label><input value="${esc(it.lab)}" placeholder="0" inputmode="numeric" oninput="uIt(${si},${ii},'lab',this.value)"></div>
        </div>
        <div class="amt"><span>금액</span><b>${tot?fmt(tot):"0"}</b></div>
      </div>`;
    });
    d.innerHTML=`<div class="sec-head">
        <span class="sec-no">${si+1}</span>
        <input class="sec-name" value="${esc(s.name)}" placeholder="공종명 (예: 목공사)" oninput="uSec(${si},this.value)">
        <span class="sec-sub">${fmt(sum.t)}</span>
        <button class="iconx" onclick="delSection(${si})">×</button>
      </div>
      <div class="sec-body">
        ${items}
        <button class="additem" onclick="addIt(${si})">＋ 품목 추가</button>
      </div>`;
    host.appendChild(d);
  });
}
function uIt(si,ii,k,v){state.sections[si].items[ii][k]=v;softTouch();}
function uSec(si,v){state.sections[si].name=v;softTouch();}
function addIt(si){state.sections[si].items.push(blankItem());renderSections();touch();}
function delIt(si,ii){state.sections[si].items.splice(ii,1);if(!state.sections[si].items.length)state.sections[si].items.push(blankItem());renderSections();touch();}
function addSection(){state.sections.push(blankSection());renderSections();touch();}
function delSection(si){state.sections.splice(si,1);if(!state.sections.length)state.sections.push(blankSection());renderSections();touch();}

function pullForm(){
  state.title=$("fTitle").value;state.client=$("fClient").value;state.date=$("fDate").value;
  state.terms=$("fTerms").value;state.r1=num($("r1").value);state.r2=num($("r2").value);
  state.r3=num($("r3").value);state.target=$("fTarget").value.trim();
}
function pushForm(){
  $("fTitle").value=state.title;$("fClient").value=state.client;$("fDate").value=state.date;
  $("fTerms").value=state.terms;$("r1").value=state.r1;$("r2").value=state.r2;$("r3").value=state.r3;
  $("fTarget").value=state.target;
}
let softTimer=null;
function softTouch(){clearTimeout(softTimer);softTimer=setTimeout(()=>{updateSummary();autosave();refreshSubtotals();if(curStep===4)buildPreview();},300);}
function touch(){pullForm();updateSummary();autosave();if(curStep===4){buildPreview();fitSheets();}}
function refreshSubtotals(){
  document.querySelectorAll("#sections .sec").forEach((el,si)=>{
    const s=state.sections[si];if(!s)return;
    el.querySelector(".sec-sub").textContent=fmt(secSum(s).t);
    el.querySelectorAll(".item").forEach((iel,ii)=>{
      const it=s.items[ii];if(!it)return;const a=itemAmt(it);
      iel.querySelector(".amt b").textContent=fmt(a.m+a.l);
    });
  });
}

/* ---------- step navigation ---------- */
function goStep(n){
  curStep=n;
  document.querySelectorAll(".step").forEach(el=>el.classList.toggle("on",+el.dataset.s===n));
  document.querySelectorAll(".segs .seg").forEach(el=>el.classList.toggle("on",+el.dataset.s<=n));
  document.querySelectorAll(".steplabels span").forEach(el=>el.classList.toggle("on",+el.dataset.s===n));
  $("btnPrev").style.display=n>1?"block":"none";
  const nextLabels={1:"품목 입력 →",2:"간접비 →",3:"미리보기 →"};
  if(n<4){$("btnNext").style.display="block";$("btnNext").textContent=nextLabels[n];}
  else $("btnNext").style.display="none";
  if(n===4){buildPreview();fitSheets();}
  updateSummary();
  $("appbodyScroll")&&0;
  document.querySelector(".appbody").scrollTop=0;
}
function nextStep(){if(curStep<4)goStep(curStep+1);}
function prevStep(){if(curStep>1)goStep(curStep-1);}

function updateSummary(){
  const c=calc();
  const barAmt=curStep<=2?c.direct:c.total;
  const labels={1:"기본정보 입력",2:"직접공사비",3:"합계 (VAT별도)",4:"합계 (VAT별도)"};
  $("barLabel").textContent=labels[curStep];
  $("barAmount").textContent="₩"+fmt(barAmt);
  $("hintTitle").textContent=state.title||"새 견적";
  const cs=$("calcSummary");
  if(cs)cs.innerHTML=`
    <div class="r"><span>직접공사비</span><b>${fmt(c.direct)}</b></div>
    <div class="r m"><span>공사경비 ${state.r1}%</span><span>${fmt(c.g1)}</span></div>
    <div class="r m"><span>공과잡비 ${state.r2}%</span><span>${fmt(c.g2)}</span></div>
    <div class="r m"><span>기업이윤 ${state.r3}%</span><span>${fmt(c.g3)}</span></div>

/* ---------- JPG export ---------- */
const isMobile=/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
function dlFile(f){const a=document.createElement("a");a.download=f.name;a.href=URL.createObjectURL(f);a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);}
async function exportJPG(){
  pullForm();
  if(!state.title){toast("공사명을 입력하세요");return;}
  $("busy").style.display="flex";
  buildPreview();
  document.querySelectorAll(".sheet").forEach(s=>s.style.transform="scale(1)");
  const names={sheetGap:"1_갑지",sheetSum:"2_집계표",sheetDet:"3_내부내역"};
  try{
    const files=[];
    for(const id of Object.keys(names)){
      const cv=await html2canvas($(id),{scale:3,backgroundColor:"#ffffff"});
      const blob=await new Promise(res=>cv.toBlob(res,"image/jpeg",0.92));
      files.push(new File([blob],`${state.title}_${names[id]}.jpg`,{type:"image/jpeg"}));
    }
    /* 폰: 공유 시트로 사진 앱 저장 / PC: 다운로드 */
    if(isMobile && navigator.canShare && navigator.canShare({files})){
      try{
        await navigator.share({files,title:state.title+" 견적서"});
        toast("공유창에서 ‘이미지 저장’을 누르면 사진에 저장돼요");
      }catch(err){
        if(err&&err.name==="AbortError"){toast("저장 취소됨");}
        else{for(const f of files){dlFile(f);await new Promise(r=>setTimeout(r,400));}toast("사진 저장이 안 돼 다운로드로 저장했어요");}
      }
    }else{
      for(const f of files){dlFile(f);await new Promise(r=>setTimeout(r,400));}
      toast("JPG 3장 저장 완료");
    }
  }catch(e){toast("오류: "+e.message);}
  fitSheets();
  $("busy").style.display="none";
}

    }
    const gray={type:"pattern",pattern:"solid",fgColor:{argb:"FFF1F1F1"}};
    const dark={type:"pattern",pattern:"solid",fgColor:{argb:"FFE2E2E2"}};

    /* 내부내역 */
    const dt=wb.addWorksheet("내부내역",{pageSetup:{orientation:"landscape",paperSize:9,fitToPage:true,fitToWidth:1,fitToHeight:1}});
    dt.columns=[{width:5},{width:20},{width:20},{width:6},{width:7},{width:11},{width:12},{width:11},{width:12},{width:11},{width:12},{width:12}];
    head(dt,"L");
    let r=4;const secSub=[];
    state.sections.forEach((s,i)=>{
      dt.getCell(`A${r}`).value=i+1;dt.getCell(`B${r}`).value=s.name;
      dt.getCell(`A${r}`).font=F(10,true);dt.getCell(`B${r}`).font=F(10,true);
      styleRow(dt,r,12);r++;
      const first=r;
      s.items.forEach(it=>{
        if(!(it.name||it.spec||num(it.qty)))return;
        dt.getCell(`B${r}`).value="  "+it.name;dt.getCell(`C${r}`).value=it.spec;
        dt.getCell(`D${r}`).value=it.unit;dt.getCell(`E${r}`).value=num(it.qty)||null;
        if(num(it.mat))dt.getCell(`F${r}`).value=num(it.mat);
        dt.getCell(`G${r}`).value={formula:`E${r}*F${r}`};
        if(num(it.lab))dt.getCell(`H${r}`).value=num(it.lab);
        dt.getCell(`I${r}`).value={formula:`E${r}*H${r}`};
        dt.getCell(`J${r}`).value={formula:`F${r}+H${r}`};
        dt.getCell(`K${r}`).value={formula:`G${r}+I${r}`};
        styleRow(dt,r,12);r++;
      });
      const last=r-1;
      dt.getCell(`B${r}`).value="소    계";dt.getCell(`B${r}`).font=F(10,true);
      ["G","I","K"].forEach(col=>{dt.getCell(`${col}${r}`).value={formula:last>=first?`SUM(${col}${first}:${col}${last})`:"0"};});
      styleRow(dt,r,12,gray);secSub.push({name:s.name,row:r});r++;
    });
    dt.getCell(`B${r}`).value="총    계";dt.getCell(`B${r}`).font=F(11,true);
    ["G","I","K"].forEach(col=>{dt.getCell(`${col}${r}`).value={formula:secSub.map(x=>col+x.row).join("+")};});
    styleRow(dt,r,12,dark);

    /* 집계표 */
    const sm=wb.addWorksheet("집계표",{pageSetup:{orientation:"landscape",paperSize:9,fitToPage:true,fitToWidth:1,fitToHeight:1}});
    sm.columns=[{width:5},{width:22},{width:20},{width:6},{width:7},{width:11},{width:12},{width:11},{width:12},{width:10},{width:11},{width:12},{width:13},{width:12}];
    smHead(sm);
    let q=4;
    sm.getCell(`A${q}`).value="A";sm.getCell(`B${q}`).value="직접공사비";
    sm.getCell(`A${q}`).font=F(10,true);sm.getCell(`B${q}`).font=F(10,true);styleRow(sm,q,14);q++;
    const firstS=q;
    secSub.forEach((x,i)=>{
      sm.getCell(`A${q}`).value=i+1;sm.getCell(`B${q}`).value=x.name;
      sm.getCell(`D${q}`).value="식";sm.getCell(`E${q}`).value=1;
      sm.getCell(`M${q}`).value={formula:`내부내역!K${x.row}`};
      styleRow(sm,q,14);q++;
    });
    const lastS=q-1;
    sm.getCell(`B${q}`).value="소    계";sm.getCell(`B${q}`).font=F(10,true);
    sm.getCell(`M${q}`).value={formula:`SUM(M${firstS}:M${lastS})`};
    styleRow(sm,q,14,gray);const directRow=q;q+=2;
    sm.getCell(`A${q}`).value="B";sm.getCell(`B${q}`).value="간접공사비";
    sm.getCell(`A${q}`).font=F(10,true);sm.getCell(`B${q}`).font=F(10,true);styleRow(sm,q,14);q++;
    const ind=[["공사경비",state.r1],["공과잡비",state.r2],["기업이윤",state.r3]];
    const indFirst=q;
    ind.forEach(([nm,rt])=>{
      sm.getCell(`B${q}`).value=nm;sm.getCell(`C${q}`).value=`직접공사비 *${rt}%`;
      sm.getCell(`M${q}`).value={formula:`ROUND(M${directRow}*${rt/100},0)`};
      styleRow(sm,q,14);q++;
    });
    sm.getCell(`B${q}`).value="소    계";sm.getCell(`B${q}`).font=F(10,true);
    sm.getCell(`M${q}`).value={formula:`SUM(M${indFirst}:M${q-1})`};
    styleRow(sm,q,14,gray);const indRow=q;q++;
    sm.getCell(`B${q}`).value="단수정리";sm.getCell(`M${q}`).value=c.cut;
    styleRow(sm,q,14);const cutRow=q;q+=2;
    sm.getCell(`B${q}`).value="합    계";sm.getCell(`B${q}`).font=F(11,true);
    sm.getCell(`M${q}`).value={formula:`M${directRow}+M${indRow}-M${cutRow}`};
    styleRow(sm,q,14,dark);

    function styleRow(ws,row,ncols,fill){
      for(let ci=1;ci<=ncols;ci++){
        const cell=ws.getRow(row).getCell(ci);
        cell.border=bAll;
        if(!cell.font)cell.font=F(10);
        if(fill)cell.fill=fill;
        if(ci>=5)cell.numFmt="#,##0";
        if(ci===4||ci===1)cell.alignment=ctr;
        if(ci===5)cell.alignment={horizontal:"right"};
      }
      ws.getRow(row).height=20;
    }
    function smHead(ws){
      ws.mergeCells("A1:N1");ws.getCell("A1").value="공 사 명 / PROJECT : "+state.title;ws.getCell("A1").font=F(12,true);
      ["A","B","C","D","E"].forEach(cl=>ws.mergeCells(`${cl}2:${cl}3`));
      ws.mergeCells("F2:G2");ws.mergeCells("H2:I2");ws.mergeCells("J2:K2");ws.mergeCells("L2:M2");ws.mergeCells("N2:N3");
      const lab={A2:"NO",B2:"품     명",C2:"규   격",D2:"단위",E2:"수량",F2:"재  료  비",H2:"노  무  비",J2:"경     비",L2:"합       계",N2:"비  고"};
      Object.entries(lab).forEach(([k,v])=>ws.getCell(k).value=v);
      [["F3","G3"],["H3","I3"],["J3","K3"],["L3","M3"]].forEach(([a,b])=>{ws.getCell(a).value="단   가";ws.getCell(b).value="금   액";});
      for(let r=2;r<=3;r++)for(let ci=1;ci<=14;ci++){
        const cell=ws.getRow(r).getCell(ci);cell.border=bAll;cell.font=F(10,true);cell.alignment=ctr;
        cell.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFE8E8E8"}};
      }
    }

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`${state.title} 견적서.xlsx`;
    a.click();
    toast("엑셀 저장 완료");
  }catch(e){toast("오류: "+e.message);console.error(e);}
  $("busy").style.display="none";
}

/* ---------- text import ---------- */
function importText(){
  const txt=$("fPaste").value.trim();
  if(!txt){toast("붙여넣을 내용이 없습니다");return;}
  const st=defaultState();st.sections=[];
  let cur=null;
  txt.split("\n").forEach(line=>{
    line=line.trim();if(!line)return;
    let m;
    if(m=line.match(/^공사명\s*[:：]\s*(.+)/)){st.title=m[1].trim();return;}
    if(m=line.match(/^제출처\s*[:：]\s*(.+)/)){st.client=m[1].trim();return;}
    if(m=line.match(/^(?:총액|목표)\s*[:：]?\s*([\d,만원 ]+)/)){
      let v=m[1].replace(/[, 원]/g,"");
      if(v.includes("만"))v=String(num(v.replace("만",""))*10000);
      st.target=String(num(v));return;
    }
    if(m=line.match(/^[\[\【](.+?)[\]\】]$/)){cur={name:m[1].trim(),items:[]};st.sections.push(cur);return;}
    if(!cur){cur={name:"공사",items:[]};st.sections.push(cur);}
    const parts=line.split("/").map(p=>p.trim());
    const it=blankItem();it.name=parts[0];
    for(let i=1;i<parts.length;i++){
      const p=parts[i];let mm;
      if(mm=p.match(/^재료\s*([\d,\.]+)$/)){it.mat=String(num(mm[1]));continue;}
      if(mm=p.match(/^노무\s*([\d,\.]+)$/)){it.lab=String(num(mm[1]));continue;}
      if(mm=p.match(/^(\S+?)\s+([\d,\.]+)$/)){
        if(!it.unit&&!/^[\d,\.]+$/.test(mm[1])){it.unit=mm[1];it.qty=String(num(mm[2]));continue;}
      }
      if(/^[\d,\.]+$/.test(p)){if(!it.mat)it.mat=String(num(p));else if(!it.lab)it.lab=String(num(p));continue;}
      if(!it.spec)it.spec=p;
    }
    if(!it.qty)it.qty="1";
    cur.items.push(it);
  });
  if(!st.sections.length){toast("공종을 찾지 못했습니다. [공종명] 형식을 확인하세요");return;}
  state=st;pushForm();renderSections();updateSummary();autosave();
  goStep(2);
  toast("불러오기 완료 — 내용을 확인하세요");
}

/* ---------- storage ---------- */
function autosave(){localStorage.setItem("mdl_draft",JSON.stringify(state));cloudPushEstimates();}
/* 저장목록 클라우드 동기화 (관리앱과 같은 mdl_cloud 설정 공유) */
const _cloud=(()=>{try{return JSON.parse(localStorage.getItem('mdl_cloud'));}catch(e){return null;}})();
let _cloudTimer=null;
function _sbh(){return {apikey:_cloud.key,Authorization:'Bearer '+_cloud.key,'Content-Type':'application/json'};}
function cloudPushEstimates(){
  if(!_cloud||!_cloud.url||!_cloud.key)return;
  clearTimeout(_cloudTimer);
  _cloudTimer=setTimeout(async()=>{
    try{
      const local=JSON.parse(localStorage.getItem('mdl_saves')||'{}');
      let remote={};
      try{const r=await fetch(_cloud.url+'/rest/v1/moredo_state?id=eq.estimates&select=data',{headers:_sbh()});
        if(r.ok){const rows=await r.json();remote=(rows[0]&&rows[0].data&&rows[0].data.saves)||{};}}catch(e){}
      const merged={...remote};
      Object.keys(local).forEach(k=>{if(!merged[k]||(local[k].t||0)>=(merged[k].t||0))merged[k]=local[k];});
      localStorage.setItem('mdl_saves',JSON.stringify(merged));
      const payload={saves:merged,draft:JSON.parse(localStorage.getItem('mdl_draft')||'null'),_ts:Date.now()};
      await fetch(_cloud.url+'/rest/v1/moredo_state',{method:'POST',headers:{..._sbh(),Prefer:'resolution=merge-duplicates'},body:JSON.stringify([{id:'estimates',data:payload,updated_at:new Date().toISOString()}])});
    }catch(e){}
  },700);
}
async function cloudPullEstimates(){
  if(!_cloud||!_cloud.url||!_cloud.key)return;
  try{
    const r=await fetch(_cloud.url+'/rest/v1/moredo_state?id=eq.estimates&select=data',{headers:_sbh()});
    if(!r.ok)return;
    const rows=await r.json();const rd=rows[0]&&rows[0].data;
    if(rd&&rd.saves){
      const local=JSON.parse(localStorage.getItem('mdl_saves')||'{}');
      const merged={...rd.saves};
      Object.keys(local).forEach(k=>{if(!merged[k]||(local[k].t||0)>(merged[k].t||0))merged[k]=local[k];});
      localStorage.setItem('mdl_saves',JSON.stringify(merged));
    }
  }catch(e){}
}
function newQuote(){if(!confirm("새 견적을 시작할까요? (현재 내용은 자동저장됨)"))return;
  if(state.title)saveNamed(state.title+" (백업)");
  state=defaultState();pushForm();renderSections();updateSummary();autosave();goStep(1);}
function saveAs(){pullForm();
  const nm=prompt("저장 이름",state.title||"견적");if(!nm)return;
  saveNamed(nm);toast("저장 완료");}
function saveNamed(nm){
  const all=JSON.parse(localStorage.getItem("mdl_saves")||"{}");
  all[nm]={t:Date.now(),data:state};
  localStorage.setItem("mdl_saves",JSON.stringify(all));cloudPushEstimates();}
function openSaves(){
  cloudPullEstimates().then(()=>{if($("dlgSaves").open)renderSaveList();});
  renderSaveList();
  $("dlgSaves").showModal();
}
function projBase(n){return (n||"").replace(/\s*v\d+\s*$/i,"").replace(/\s*\(\d{4}-\d{2}-\d{2}\)\s*$/,"").replace(/\s*\(백업\)\s*$/,"").trim()||n;}
function renderSaveList(){
  const all=JSON.parse(localStorage.getItem("mdl_saves")||"{}");
  const q=(($("saveSearch")&&$("saveSearch").value)||"").trim().toLowerCase();
  const ul=$("saveList");ul.innerHTML="";
  let keys=Object.keys(all);
  if(q)keys=keys.filter(k=>k.toLowerCase().includes(q));
  if(!keys.length){ul.innerHTML="<li class='nm' style='color:#999'>"+(q?"검색 결과 없음":"저장된 견적이 없습니다")+"</li>";return;}
  const groups={};keys.forEach(k=>{const b=projBase(k);(groups[b]=groups[b]||[]).push(k);});
  const gnames=Object.keys(groups).sort((a,b)=>Math.max(...groups[b].map(k=>all[k].t||0))-Math.max(...groups[a].map(k=>all[k].t||0)));
  gnames.forEach(g=>{
    const items=groups[g].sort((a,b)=>(all[b].t||0)-(all[a].t||0));
    const hd=document.createElement("li");
    hd.style.cssText="display:block;border:none;padding:13px 2px 5px;font-size:12.5px;font-weight:800;color:#8B6914";
    hd.textContent="📁 "+g+"  ("+items.length+")";
    ul.appendChild(hd);
    items.forEach(k=>{
      const li=document.createElement("li");li.style.paddingLeft="10px";
      const label=(k===g)?new Date(all[k].t).toLocaleDateString("ko-KR"):esc(k);
      li.innerHTML=`<span class="nm">${label}<br><small style="color:#999">${new Date(all[k].t).toLocaleString("ko-KR")}</small></span>
      <button class="open">열기</button><button class="del">삭제</button>`;
      li.children[1].onclick=()=>{state=all[k].data;if(!state.sections||!state.sections.length)state.sections=[blankSection()];pushForm();renderSections();updateSummary();autosave();$("dlgSaves").close();goStep(1);toast("불러왔습니다");};
      li.children[2].onclick=()=>{if(confirm("삭제할까요?")){delete all[k];localStorage.setItem("mdl_saves",JSON.stringify(all));cloudPushEstimates();renderSaveList();}};
      ul.appendChild(li);
    });
  });
}
function toast(msg){const t=$("toast");t.textContent=msg;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),2200);}

/* ---------- 단가사전에서 담은 품목 불러오기 ---------- */
function importDictPicks(){
  let picks=[];try{picks=JSON.parse(localStorage.getItem("mdl_dict_pick")||"[]");}catch(e){}
  if(!picks.length)return false;
  const byCat={};picks.forEach(p=>{(byCat[p.cat||"담은 품목"]=byCat[p.cat||"담은 품목"]||[]).push(p);});
  Object.keys(byCat).forEach(cat=>{
    let sec=state.sections.find(s=>s.name===cat);
    if(!sec){sec={name:cat,items:[]};state.sections.push(sec);}
    byCat[cat].forEach(p=>sec.items.push({name:p.name||"",spec:p.spec||"",unit:p.unit||"식",qty:"1",mat:String(p.mat||""),lab:String(p.lab||"")}));
  });
  state.sections=state.sections.filter(s=>(s.name&&s.name.trim())||s.items.some(it=>it.name&&it.name.trim()));
  if(!state.sections.length)state.sections=[blankSection()];
  localStorage.removeItem("mdl_dict_pick");
  return picks.length;
}
/* ---------- init ---------- */
(function(){
  cloudPullEstimates();
  const saved=localStorage.getItem("mdl_draft");
  state=saved?JSON.parse(saved):defaultState();
  if(!state.sections||!state.sections.length)state.sections=[blankSection()];
  const picked=importDictPicks();
  pushForm();renderSections();
  if(picked){autosave();goStep(2);setTimeout(()=>toast("단가사전에서 "+picked+"개 품목을 불러왔어요"),300);}
  else goStep(1);
})();
</script>
